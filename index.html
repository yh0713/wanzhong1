<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合业务客服运营助手 - 代驾/快递/商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            height: 85vh;
        }

        /* 左侧面板 */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(5px);
        }

        .service-item.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        .service-icon {
            font-size: 18px;
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            font-size: 12px;
            line-height: 1.8;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-label {
            opacity: 0.9;
        }

        .stat-value {
            font-weight: bold;
            color: #ffd700;
        }

        /* 主聊天区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: bold;
        }

        .header-status {
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00d084;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.bot .message-bubble {
            background: #e8eef7;
            color: #333;
            border-radius: 12px 12px 12px 0;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 12px;
        }

        .quick-replies {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-reply-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            color: #667eea;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
        }

        #sendBtn:active {
            transform: translateY(0);
        }

        /* 转化提示 */
        .conversion-banner {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #333;
            padding: 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .conversion-banner strong {
            font-size: 14px;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #1976d2;
            margin: 10px 0;
        }

        .success-message {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #2e7d32;
            margin: 10px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e8eef7;
            border-radius: 12px 12px 12px 0;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
                align-items: stretch;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .container {
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                max-width: 100%;
                flex-direction: column;
                box-shadow: none;
            }

            /* 手机上隐藏左侧边栏 */
            .sidebar {
                display: none;
            }

            .chat-container {
                width: 100%;
                height: 100%;
            }

            .chat-header {
                padding: 16px 18px;
            }

            .header-title {
                font-size: 18px;
            }

            .header-status {
                font-size: 13px;
                padding: 8px 14px;
            }

            .status-dot {
                width: 10px;
                height: 10px;
            }

            .chat-body {
                padding: 18px;
                gap: 16px;
            }

            .message-bubble {
                max-width: 90%;
                font-size: 16px;
                line-height: 1.7;
                padding: 14px 18px;
                border-radius: 14px;
            }

            .message.bot .message-bubble {
                border-radius: 14px 14px 14px 0;
            }

            .message.user .message-bubble {
                border-radius: 14px 14px 0 14px;
            }

            .quick-replies {
                margin-top: 12px;
                gap: 10px;
            }

            .quick-reply-btn {
                font-size: 15px;
                padding: 14px 18px;
                border-radius: 10px;
                line-height: 1.5;
            }

            .input-area {
                padding: 16px 18px;
                border-top-width: 2px;
            }

            #messageInput {
                font-size: 16px; /* 防止 iOS 自动放大输入框 */
                padding: 14px 18px;
                border-radius: 26px;
                min-height: 50px;
            }

            #sendBtn {
                padding: 14px 26px;
                font-size: 16px;
                border-radius: 26px;
                min-width: 80px;
            }

            .conversion-banner {
                font-size: 14px;
                padding: 16px;
                border-radius: 10px;
                gap: 12px;
            }

            .conversion-banner strong {
                font-size: 15px;
            }

            .info-box {
                font-size: 14px;
                padding: 14px 16px;
                border-radius: 8px;
                line-height: 1.6;
            }

            .success-message {
                font-size: 14px;
                padding: 14px 16px;
                border-radius: 8px;
                line-height: 1.6;
            }

            .typing-indicator {
                padding: 14px 18px;
                border-radius: 14px 14px 14px 0;
                gap: 6px;
            }

            .typing-dot {
                width: 10px;
                height: 10px;
            }
        }

        .input-area-info {
            font-size: 12px;
            color: #999;
            padding: 8px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div>
                <div class="sidebar-title">🎯 服务选择</div>
                <div class="service-list">
                    <div class="service-item active" data-service="all">
                        <span class="service-icon">🌟</span>
                        <span>全部服务</span>
                    </div>
                    <div class="service-item" data-service="drivingservice">
                        <span class="service-icon">🚗</span>
                        <span>代驾服务</span>
                    </div>
                    <div class="service-item" data-service="express">
                        <span class="service-icon">📦</span>
                        <span>快递服务</span>
                    </div>
                    <div class="service-item" data-service="mall">
                        <span class="service-icon">🛍️</span>
                        <span>商城购物</span>
                    </div>
                </div>
            </div>

            <div class="stats-box">
                <div class="sidebar-title">📊 服务数据</div>
                <div class="stat-item">
                    <span class="stat-label">累计服务</span>
                    <span class="stat-value">10万+</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">客户满意度</span>
                    <span class="stat-value">98.5%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">平均响应</span>
                    <span class="stat-value">2.4秒</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">24h在线</span>
                    <span class="stat-value">全年</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">成交转化</span>
                    <span class="stat-value">>30%</span>
                </div>
            </div>
        </div>

        <!-- 聊天主区域 -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-title">🤖 综合业务客服运营助手</div>
                <div class="header-status">
                    <span class="status-dot"></span>
                    <span>在线</span>
                </div>
            </div>

            <div class="chat-body">
                <div id="chatMessages"></div>
            </div>

            <div class="input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="输入您的需求（代驾、快递、购物）..."
                    autocomplete="off"
                >
                <button id="sendBtn">发送</button>
            </div>
            <div class="input-area-info">
                💡 提示：这是智能客服系统演示。您可以询问代驾、快递或商城的相关问题。
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api/v2';
        let currentService = 'all';
        let conversationId = `conv_${Date.now()}`;
        let messageCount = 0;

        // 服务选择
        document.querySelectorAll('.service-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                currentService = this.dataset.service;
                
                const serviceName = this.textContent.trim();
                addBotMessage(`✅ 已切换到「${serviceName}」，请继续提问。`);
            });
        });

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            addUserMessage(message);
            input.value = '';

            // 调用 API
            callAPI(message);
        }

        // 调用后端 API
        async function callAPI(message) {
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        conversationId,
                        service: currentService
                    })
                });

                const data = await response.json();
                removeTyping();

                if (data.success) {
                    addBotMessage(data.response);
                    messageCount++;

                    // 如果需要转接人工
                    if (data.shouldTransfer) {
                        setTimeout(() => {
                            showTransferBanner();
                        }, 1000);
                    }
                } else {
                    addBotMessage('抱歉，处理您的请求时出了点问题。请稍后重试。');
                }
            } catch (error) {
                removeTyping();
                console.error('API Error:', error);
                // 使用本地模拟
                simulateResponse(message);
            }
        }

        // 本地模拟（后端未启动时）
        function simulateResponse(message) {
            const responses = {
                drivingservice: `✅ 代驾已覆盖本区域，夜间可正常接单。
                
💰 价格：起价50元，超10km每km5元
⏰ 到达时间：10-15分钟
🎯 要预约代驾吗？

方便留个微信吗？我给您发最新价格和优惠。`,
                express: `📦 寄件支持上门取件，价格透明。

💰 首重10元/kg，续重2元/500g
⏰ 同城6小时，省内48小时
🚚 上门取件免费

能否告诉我物品重量和地址？`,
                mall: `🛍️ 本店商品现货直发，质量有保障。

💰 新用户立减50元（满199元）
⏰ 发货24-48小时
✅ 7天无理由退货

现在下单可享优惠，需要我帮您介绍什么商品吗？`
            };

            const service = currentService === 'all' ? 'drivingservice' : currentService;
            addBotMessage(responses[service] || responses.drivingservice);

            messageCount++;

            if (messageCount > 3) {
                setTimeout(() => showTransferBanner(), 1000);
            }
        }

        // UI 函数
        function addUserMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addBotMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            
            // 支持换行和格式化
            const formatted = text.split('\n').join('<br>');
            msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function showTransferBanner() {
            const messagesDiv = document.getElementById('chatMessages');
            const bannerDiv = document.createElement('div');
            bannerDiv.className = 'conversion-banner';
            bannerDiv.innerHTML = `
                <span>🎯</span>
                <div>
                    <strong>优质转化机会！</strong><br>
                    我已记录您的信息，专员将在5分钟内联系您。方便留个微信吗？
                </div>
            `;
            messagesDiv.appendChild(bannerDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        window.addEventListener('load', () => {
            addBotMessage(`👋 您好！我是综合业务客服运营助手。

我可以为您提供：
🚗 代驾服务 - 24小时在线，夜间可接单
📦 快递服务 - 同城6小时，省内48小时
🛍️ 商城购物 - 正品保证，7天无理由退货

请告诉我您需要什么帮助？`);
        });
    </script>
</body>
</html>
